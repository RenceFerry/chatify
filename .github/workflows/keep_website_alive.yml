name: Keep Website Awake

on:
  schedule:
    - cron: '*/10 * * * *' # Every 10 mins for Render
  workflow_dispatch: # Allows manual testing

jobs:
  ping:
    runs-on: ubuntu-latest
    # This block gives the robot permission to push the heartbeat commit
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Hit the website URL with Retries
        run: |
          curl --retry 3 \
               --retry-delay 5 \
               --retry-all-errors \
               -fsSL ${{ secrets.RENDER_URL }} > /dev/null

      - name: Monthly Heartbeat Commit
        # Only runs at 00:00 on the 1st of the month
        if: github.event.schedule == '0 0 1 * *'
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          echo "Last heartbeat: $(date)" > heartbeat.txt
          git add heartbeat.txt
          git commit -m "chore: monthly heartbeat to keep action active"
          git push
